version: "3.9"

services:
  backend:
    image: marketpy-backend:staging
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      - APP_ENV=staging
      - DATA_DIR=/app/data
    ports:
      - "8000:8000"
    volumes:
      - ../data:/app/data

  frontend:
    image: marketpy-frontend:staging
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
