environment: staging
backend_port: 8000
frontend_port: 3000
cors_origins:
  - http://localhost:3000
  - http://staging.localhost:3000
bar_size: 5m
default_fee_rate: 0.001
default_fee_exponent: 2.0
initial_cash: 10000.0
fill_model: M2
backtest_execution_mode: event_driven
max_position_per_market: 1000.0
max_total_exposure: 5000.0
max_daily_loss: 500.0
cooldown_seconds: 60
model_dir: models
data_dir: data
indicator_library: auto
feature_scaler_type: standard
feature_importance_method: tree
edge_buffer: 0.02
kelly_fraction: 0.1
discord_webhook_url: null
discord_rate_limit_per_minute: 10
discord_enabled_categories: ERROR,WARNING,INFO,TRADE,RISK,SYSTEM
