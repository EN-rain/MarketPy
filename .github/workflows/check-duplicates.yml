name: Check for Duplicate Dataclasses

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  check-duplicates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Check for duplicate dataclass definitions
      run: |
        python scripts/check_duplicate_dataclasses.py
    
    - name: Report status
      if: failure()
      run: |
        echo "❌ Duplicate dataclass definitions detected!"
        echo "Please remove duplicates and use canonical model definitions."
        echo "See backend/app/models/market.py for examples."
        exit 1
