name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-tests:
    name: Backend Tests + Coverage
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run backend tests with coverage
      run: pytest --cov=backend --cov-report=xml --cov-report=term-missing -v || true

    - name: Validate coverage targets
      run: python scripts/coverage_targets.py || true

  frontend-lint:
    name: Frontend Linting
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      working-directory: frontend
      run: npm install
    
    - name: Run ESLint on all TypeScript files
      working-directory: frontend
      run: npm run lint || true

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      working-directory: frontend
      run: npm install

    - name: Run frontend tests with coverage
      working-directory: frontend
      run: npm run test:coverage || true

  backend-lint:
    name: Backend Linting + Type Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run Ruff linter
      run: ruff check backend || true

    - name: Run Ruff formatter check
      run: ruff format --check backend || true

    - name: Run mypy type checker
      run: mypy backend --ignore-missing-imports || true

  check-duplicates:
    name: Check Duplicate Dataclasses
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    
    - name: Check for duplicate dataclass definitions
      run: python scripts/check_duplicate_dataclasses.py || true
