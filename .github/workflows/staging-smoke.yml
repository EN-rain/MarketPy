name: Staging Smoke Verification

on:
  workflow_dispatch:
    inputs:
      staging_api_url:
        description: "Staging API base URL, e.g. https://staging-api.example.com"
        required: true
        type: string
      auth_endpoint:
        description: "Optional auth-protected endpoint to verify"
        required: false
        default: ""
        type: string
      auth_expected_status:
        description: "Expected status code for auth endpoint"
        required: false
        default: "200"
        type: string

jobs:
  smoke:
    name: Run staging smoke checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install smoke dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx

      - name: Run smoke script
        env:
          STAGING_API_URL: ${{ inputs.staging_api_url }}
          APP_ENV: staging
          SMOKE_REQUIRE_REMOTE: "true"
          SMOKE_AUTH_ENDPOINT: ${{ inputs.auth_endpoint }}
          SMOKE_AUTH_EXPECTED_STATUS: ${{ inputs.auth_expected_status }}
          AUTH_BEARER_TOKEN: ${{ secrets.STAGING_AUTH_BEARER_TOKEN }}
          SMOKE_REPORT_PATH: deploy/staging-smoke-report.md
        run: python scripts/smoke_staging.py

      - name: Upload smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-smoke-report
          path: deploy/staging-smoke-report.md
