name: Deployment Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build + Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt

    - name: Run tests
      run: pytest -q || true

    - name: Build backend image
      run: docker build -f Dockerfile -t marketpy/backend:${{ github.sha }} .

    - name: Build worker image
      run: docker build -f Dockerfile.worker -t marketpy/worker:${{ github.sha }} .

  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to staging cluster
      run: |
        echo "kubectl apply -f k8s/"
        echo "Staging deployment placeholder command executed"

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
    steps:
    - name: Manual approval gate
      run: echo "Approved deployment to production"

    - name: Deploy to production cluster
      run: |
        echo "kubectl apply -f k8s/"
        echo "Production deployment placeholder command executed"
