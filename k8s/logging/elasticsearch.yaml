apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: marketpy-elasticsearch
spec:
  serviceName: marketpy-elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: marketpy-elasticsearch
  template:
    metadata:
      labels:
        app: marketpy-elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
        env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: "false"
        ports:
        - containerPort: 9200
---
apiVersion: v1
kind: Service
metadata:
  name: marketpy-elasticsearch
spec:
  selector:
    app: marketpy-elasticsearch
  ports:
  - port: 9200
    targetPort: 9200
