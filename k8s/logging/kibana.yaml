apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketpy-kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketpy-kibana
  template:
    metadata:
      labels:
        app: marketpy-kibana
    spec:
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.15.0
        env:
        - name: ELASTICSEARCH_HOSTS
          value: http://marketpy-elasticsearch:9200
        ports:
        - containerPort: 5601
---
apiVersion: v1
kind: Service
metadata:
  name: marketpy-kibana
spec:
  selector:
    app: marketpy-kibana
  ports:
  - port: 5601
    targetPort: 5601
