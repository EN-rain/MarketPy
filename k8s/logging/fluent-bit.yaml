apiVersion: v1
kind: ConfigMap
metadata:
  name: marketpy-fluent-bit-config
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush 1
        Daemon Off
        Log_Level info

    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        Parser docker
        Tag kube.*

    [OUTPUT]
        Name es
        Match *
        Host marketpy-elasticsearch
        Port 9200
        Logstash_Format On
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: marketpy-fluent-bit
spec:
  selector:
    matchLabels:
      app: marketpy-fluent-bit
  template:
    metadata:
      labels:
        app: marketpy-fluent-bit
    spec:
      containers:
      - name: fluent-bit
        image: cr.fluentbit.io/fluent/fluent-bit:3.1.9
        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc/
      volumes:
      - name: config
        configMap:
          name: marketpy-fluent-bit-config
