apiVersion: v1
kind: ConfigMap
metadata:
  name: marketpy-alertmanager-config
data:
  alertmanager.yml: |
    route:
      receiver: default
    receivers:
      - name: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketpy-alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketpy-alertmanager
  template:
    metadata:
      labels:
        app: marketpy-alertmanager
    spec:
      containers:
      - name: alertmanager
        image: prom/alertmanager:v0.27.0
        args:
        - --config.file=/etc/alertmanager/alertmanager.yml
        volumeMounts:
        - name: config
          mountPath: /etc/alertmanager
      volumes:
      - name: config
        configMap:
          name: marketpy-alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: marketpy-alertmanager
spec:
  selector:
    app: marketpy-alertmanager
  ports:
  - port: 9093
    targetPort: 9093
