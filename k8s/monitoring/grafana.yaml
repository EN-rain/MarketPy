apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketpy-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketpy-grafana
  template:
    metadata:
      labels:
        app: marketpy-grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:11.2.0
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: marketpy-grafana
spec:
  selector:
    app: marketpy-grafana
  ports:
  - port: 3000
    targetPort: 3000
