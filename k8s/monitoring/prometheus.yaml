apiVersion: v1
kind: ConfigMap
metadata:
  name: marketpy-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - /etc/prometheus/alert.rules.yml
    scrape_configs:
      - job_name: marketpy-backend
        static_configs:
          - targets: ["marketpy-backend:80"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketpy-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: marketpy-prometheus
  template:
    metadata:
      labels:
        app: marketpy-prometheus
    spec:
      containers:
      - name: prometheus
        image: prom/prometheus:v2.54.1
        args:
        - --config.file=/etc/prometheus/prometheus.yml
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
      volumes:
      - name: config
        configMap:
          name: marketpy-prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: marketpy-prometheus
spec:
  selector:
    app: marketpy-prometheus
  ports:
  - port: 9090
    targetPort: 9090
